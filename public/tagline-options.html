<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tagline Options — New Ontologies</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter+Tight:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --black: #1A0905;
    --cream: #E3DFCE;
    --accent: #94B1C8;
    --gray-400: #A88878;
    --gray-500: #8A6050;
    --gray-300: #C8B0A4;
    --border: #C8B0A4;
    --font-display: 'Instrument Serif', Georgia, serif;
    --font-body: 'Inter Tight', sans-serif;
  }
  body {
    background: #ECEAE3;
    font-family: var(--font-body);
    color: var(--black);
    padding: 2rem;
  }

  /* Switcher */
  .switcher {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 2rem;
    flex-wrap: wrap;
  }
  .switcher button {
    font-family: var(--font-body);
    font-size: 0.65rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 0.4em 1em;
    border: 1px solid var(--border);
    border-radius: 2px;
    background: white;
    color: var(--gray-500);
    cursor: pointer;
    transition: all 0.15s;
  }
  .switcher button.active, .switcher button:hover {
    background: var(--black);
    color: var(--cream);
    border-color: var(--black);
  }
  .option { display: none; }
  .option.active { display: block; }

  /* Shell */
  .site {
    background: var(--cream);
    max-width: 1100px;
    margin: 0 auto;
    border: 1px solid var(--border);
    overflow: hidden;
  }

  /* Fixed header — same for all */
  .nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.5rem 2.5rem;
    border-bottom: 1px solid var(--border);
  }
  .logo {
    font-family: var(--font-display);
    font-size: 3rem;
    color: var(--black);
    text-decoration: none;
    letter-spacing: -0.03em;
    line-height: 0.9;
  }
  .nav-links { display: flex; gap: 1.5rem; }
  .nav-links a {
    font-size: 0.65rem; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.08em; color: var(--gray-500); text-decoration: none;
  }

  /* Fixed hero — same for all */
  .hero { position: relative; height: 280px; overflow: hidden; }
  .hero img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .hero-overlay { position: absolute; inset: 0; background: rgba(26,9,5,0.32); }

  /* Shared post chrome */
  .posts { padding: 0 2.5rem 2rem; }
  .feat-card { display: block; text-decoration: none; border-bottom: 1px solid var(--border); padding-bottom: 1.2rem; margin-top: 1.5rem; }
  .feat-img-wrap { width: 100%; height: 200px; overflow: hidden; }
  .feat-img-wrap img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(1) brightness(0.9); transition: filter 0.5s; }
  .feat-card:hover .feat-img-wrap img { filter: grayscale(0) brightness(1); }
  .feat-body { display: grid; grid-template-columns: 1fr auto; gap: 1rem; padding-top: 0.8rem; align-items: start; }
  .feat-title { font-family: var(--font-display); font-size: 1.5rem; font-weight: 400; color: var(--black); letter-spacing: -0.02em; line-height: 1.15; }
  .feat-sub { font-size: 0.75rem; color: var(--gray-500); margin-top: 0.2rem; line-height: 1.5; }
  .feat-meta { font-size: 0.62rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--gray-400); white-space: nowrap; }


  /* ══════════════════════════════════════
     A — Current: two-column, serif question + description
     ══════════════════════════════════════ */
  .tag-a {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 3rem;
    padding: 1.5rem 2.5rem;
    border-bottom: 1px solid var(--border);
    align-items: start;
  }
  .tag-a-q {
    font-family: var(--font-display);
    font-size: 1.2rem;
    font-weight: 400;
    line-height: 1.2;
    letter-spacing: -0.02em;
    color: var(--black);
  }
  .tag-a-desc {
    font-size: 0.78rem;
    color: var(--gray-500);
    line-height: 1.75;
    align-self: center;
  }

  /* ══════════════════════════════════════
     B — Large single-line question, full width, centered
     ══════════════════════════════════════ */
  .tag-b {
    padding: 2.5rem 2.5rem 2rem;
    border-bottom: 1px solid var(--border);
    text-align: center;
  }
  .tag-b-q {
    font-family: var(--font-display);
    font-size: clamp(1.6rem, 2.8vw, 2.4rem);
    font-weight: 400;
    line-height: 1.15;
    letter-spacing: -0.025em;
    color: var(--black);
    max-width: 760px;
    margin: 0 auto 0.75rem;
  }
  .tag-b-desc {
    font-size: 0.75rem;
    color: var(--gray-400);
    letter-spacing: 0.01em;
  }

  /* ══════════════════════════════════════
     C — Just a single italicised line, tight + understated
     ══════════════════════════════════════ */
  .tag-c {
    padding: 1rem 2.5rem;
    border-bottom: 1px solid var(--border);
  }
  .tag-c-line {
    font-family: var(--font-display);
    font-style: italic;
    font-size: 1rem;
    color: var(--gray-500);
    letter-spacing: -0.01em;
  }

  /* ══════════════════════════════════════
     D — No tagline at all — let the posts speak
     ══════════════════════════════════════ */
  .tag-d {
    padding: 0.5rem 0;
  }

  /* ══════════════════════════════════════
     E — Big left-aligned question, description below in small caps
     ══════════════════════════════════════ */
  .tag-e {
    padding: 2rem 2.5rem;
    border-bottom: 1px solid var(--border);
  }
  .tag-e-q {
    font-family: var(--font-display);
    font-size: clamp(1.8rem, 3vw, 2.8rem);
    font-weight: 400;
    line-height: 1.1;
    letter-spacing: -0.03em;
    color: var(--black);
    max-width: 640px;
    margin-bottom: 0.75rem;
  }
  .tag-e-desc {
    font-size: 0.6rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--gray-400);
  }

  /* ══════════════════════════════════════
     F — Three short pillars side by side
     ══════════════════════════════════════ */
  .tag-f {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    border-bottom: 1px solid var(--border);
  }
  .tag-f-col {
    padding: 1.5rem 2rem;
    border-right: 1px solid var(--border);
  }
  .tag-f-col:last-child { border-right: none; }
  .tag-f-label {
    font-size: 0.58rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--accent);
    margin-bottom: 0.4rem;
  }
  .tag-f-text {
    font-family: var(--font-display);
    font-size: 0.95rem;
    line-height: 1.35;
    letter-spacing: -0.01em;
    color: var(--black);
  }

  /* ══════════════════════════════════════
     G — Accent stripe with reversed colors
     ══════════════════════════════════════ */
  .tag-g {
    background: var(--black);
    padding: 1.5rem 2.5rem;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 3rem;
    align-items: center;
  }
  .tag-g-q {
    font-family: var(--font-display);
    font-size: 1.15rem;
    font-weight: 400;
    line-height: 1.2;
    letter-spacing: -0.02em;
    color: var(--cream);
  }
  .tag-g-desc {
    font-size: 0.75rem;
    color: rgba(227,223,206,0.55);
    line-height: 1.7;
  }
</style>
</head>
<body>

<div class="switcher">
  <button class="active" onclick="show('a')">A — Two column (current)</button>
  <button onclick="show('b')">B — Centered big question</button>
  <button onclick="show('c')">C — Subtle italic line</button>
  <button onclick="show('d')">D — None, just posts</button>
  <button onclick="show('e')">E — Big question + small caps</button>
  <button onclick="show('f')">F — Three pillars</button>
  <button onclick="show('g')">G — Dark stripe</button>
</div>

<!-- shared header + hero macro -->
<template id="chrome-top">
  <header class="nav">
    <a href="#" class="logo">New Ontologies</a>
    <nav class="nav-links">
      <a href="#">Archive</a>
      <a href="#">About</a>
    </nav>
  </header>
  <div class="hero">
    <img src="/images/halftone-bridge.png" alt="Bridge" />
    <div class="hero-overlay"></div>
  </div>
</template>
<template id="chrome-posts">
  <div class="posts">
    <a class="feat-card" href="#">
      <div class="feat-img-wrap"><img src="/images/teampic.jpg" alt="" /></div>
      <div class="feat-body">
        <div>
          <div class="feat-title">New Ontologies: Ando</div>
          <div class="feat-sub">Inside Ando — building the scaffolding for a new communication layer between agents and humans.</div>
        </div>
        <div class="feat-meta">Feb 2026</div>
      </div>
    </a>
  </div>
</template>

<!-- A -->
<div class="option active" id="opt-a">
  <div class="site"></div>
</div>
<!-- B -->
<div class="option" id="opt-b">
  <div class="site"></div>
</div>
<!-- C -->
<div class="option" id="opt-c">
  <div class="site"></div>
</div>
<!-- D -->
<div class="option" id="opt-d">
  <div class="site"></div>
</div>
<!-- E -->
<div class="option" id="opt-e">
  <div class="site"></div>
</div>
<!-- F -->
<div class="option" id="opt-f">
  <div class="site"></div>
</div>
<!-- G -->
<div class="option" id="opt-g">
  <div class="site"></div>
</div>

<script>
  const taglineHTML = {
    a: `<div class="tag-a">
          <strong class="tag-a-q">How do we talk more ambitiously about the future?</strong>
          <p class="tag-a-desc">Long-form field studies of the people and products reshaping cultural infrastructure.</p>
        </div>`,
    b: `<div class="tag-b">
          <p class="tag-b-q">How do we talk more ambitiously about the future?</p>
          <p class="tag-b-desc">Long-form field studies — people and products reshaping cultural infrastructure.</p>
        </div>`,
    c: `<div class="tag-c">
          <span class="tag-c-line">How do we talk more ambitiously about the future?</span>
        </div>`,
    d: `<div class="tag-d"></div>`,
    e: `<div class="tag-e">
          <p class="tag-e-q">How do we talk more ambitiously about the future?</p>
          <p class="tag-e-desc">Long-form field studies of the people and products reshaping cultural infrastructure</p>
        </div>`,
    f: `<div class="tag-f">
          <div class="tag-f-col">
            <div class="tag-f-label">The question</div>
            <p class="tag-f-text">How do we talk more ambitiously about the future?</p>
          </div>
          <div class="tag-f-col">
            <div class="tag-f-label">The work</div>
            <p class="tag-f-text">Long-form field studies of consequential companies and founders.</p>
          </div>
          <div class="tag-f-col">
            <div class="tag-f-label">The form</div>
            <p class="tag-f-text">First entry points into new, rich, intellectual worlds.</p>
          </div>
        </div>`,
    g: `<div class="tag-g">
          <strong class="tag-g-q">How do we talk more ambitiously about the future?</strong>
          <p class="tag-g-desc">Long-form field studies of the people and products reshaping cultural infrastructure.</p>
        </div>`,
  };

  function buildSite(key) {
    const top = document.getElementById('chrome-top').content.cloneNode(true);
    const posts = document.getElementById('chrome-posts').content.cloneNode(true);
    const site = document.querySelector(`#opt-${key} .site`);
    site.innerHTML = '';
    site.appendChild(top);
    site.insertAdjacentHTML('beforeend', taglineHTML[key]);
    site.appendChild(posts);
  }

  function show(key) {
    document.querySelectorAll('.option').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.switcher button').forEach(el => el.classList.remove('active'));
    document.getElementById('opt-' + key).classList.add('active');
    event.currentTarget.classList.add('active');
  }

  // Build all on load
  ['a','b','c','d','e','f','g'].forEach(buildSite);
</script>
</body>
</html>
